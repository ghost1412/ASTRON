version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: query_intel_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: query_intel_master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d query_intel_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: query_intel_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    container_name: query_intel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: query_intel_cold_storage
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  platform-gateway:
    build: .
    container_name: query_intel_gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432
      - REDIS_HOST=redis
      - SHARD_COUNT=3
    volumes:
      - .:/app
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  platform-frontend:
    image: nginx:alpine
    container_name: query_intel_frontend
    depends_on:
      - platform-gateway
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  analysis-worker:
    build: .
    # No fixed container_name to allow horizontal scaling (e.g., --scale analysis-worker=3)
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://admin:password@postgres:5432
      - ELATICSEARCH_URL=http://elasticsearch:9200
      - SHARD_COUNT=3
    volumes:
      - .:/app
    command: ["python3", "-m", "workers.worker"]
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; r = redis.Redis(host='redis'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3

  dlm-archiver:
    build: .
    container_name: query_intel_archiver
    depends_on:
      - postgres
      - minio
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432
      - ACTIVE_TENANT=test-company-1
    command: ["python3", "-m", "workers.archiver"]
    profiles:
      - utility

volumes:
  postgres_data:
  es_data:
  minio_data:

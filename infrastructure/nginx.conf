events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. Dynamic Docker Resolver (DNS)
    # 127.0.0.11 is the default Docker DNS server.
    # 'valid=15s' forces frequent re-resolution of the platform-gateway IP.
    resolver 127.0.0.11 valid=15s;

    server {
        listen 80;
        server_name localhost;

        # 2. Main Entry Point Redirect
        location = / {
            return 301 /dashboard/index.html;
        }

        # 3. Static Frontend Dashboard
        location /dashboard/ {
            alias /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 4. Headless API Reverse Proxy (Resilient)
        # Using a variable ($upstream) forces Nginx to use the resolver 
        # on every request, bypassing stale IP caching.
        location /v1/ {
            set $upstream http://platform-gateway:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Health Check Proxy (Resilient)
        location /health {
            set $upstream http://platform-gateway:8000/health;
            proxy_pass $upstream;
        }
    }
}
